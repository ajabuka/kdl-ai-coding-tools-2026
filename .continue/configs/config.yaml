name: Working Critically with AI Coding Tools
version: 1.0.0
schema: v1
models:
  - name: Open Router Free Models
    provider: openrouter
    model: openrouter/free
    apiKey: ${{ secrets.OPENROUTER_API_KEY }}
  - name: Nex AGI Nex-N2-Pro (free)
    provider: openrouter
    model: nex-agi/nex-n2-pro:free
    apiKey: ${{ secrets.OPENROUTER_API_KEY }}
  - name: Poolside Laguna M.1 (free)
    provider: openrouter
    model: poolside/laguna-m.1:free
    apiKey: ${{ secrets.OPENROUTER_API_KEY }}
  - name: LLM7 Default (Free)
    provider: openai
    model: default
    apiBase: https://api.llm7.io/v1
    apiKey: ${{ secrets.LLM7_API_KEY }}
  - name: LLM7 Fast (Free)
    provider: openai
    model: fast
    apiBase: https://api.llm7.io/v1
    apiKey: ${{ secrets.LLM7_API_KEY }}
  - name: LLM7 Qwen3-235B (Free)
    provider: openai
    model: qwen3-235b
    apiBase: https://api.llm7.io/v1
    apiKey: ${{ secrets.LLM7_API_KEY }}
